<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        #container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        const FPS = 24;
        const INTERVAL = 1000 / FPS;
        const STATES = {
            idle:      { color: 0x00ffcc, wireframe: true,  speed: 0.01 },
            busy:      { color: 0xffaa00, wireframe: true,  speed: 0.05 },
            emergency: { color: 0xff0000, wireframe: false, speed: 0.02 },
        };

        let currentState = 'idle';
        let scene, camera, renderer, mesh;
        let then = Date.now();

        function applyState(state) {
            const cfg = STATES[state] ?? STATES.idle;
            mesh.material.color.setHex(cfg.color);
            mesh.material.wireframe = cfg.wireframe;
            currentState = state;
            try { sessionStorage.setItem('alana_state', state); } catch(_) {}
        }

        function init() {
            // Recupera estado sobrevivente de rerun anterior
            const saved = sessionStorage.getItem('alana_state');
            if (saved && STATES[saved]) currentState = saved;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(
                75, window.innerWidth / window.innerHeight, 0.1, 1000
            );
            camera.position.z = 4;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            const geometry = new THREE.IcosahedronGeometry(1.5, 2);
            const material = new THREE.MeshPhongMaterial({
                color: 0x00ffcc,
                wireframe: true,
                emissive: 0x004433,
                emissiveIntensity: 0.5,
            });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(10, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            applyState(currentState);
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();
            const elapsed = now - then;
            if (elapsed < INTERVAL) return;
            then = now - (elapsed % INTERVAL);

            const speed = STATES[currentState]?.speed ?? 0.01;
            mesh.rotation.x += speed;
            mesh.rotation.y += speed;
            renderer.render(scene, camera);
        }

        // Aceita mensagens de qualquer iframe no mesmo parent (necessário
        // porque o remetente é o mini-iframe de 0px, não o Python diretamente)
        window.addEventListener('message', (event) => {
            const { type, state } = event.data ?? {};
            if (type === 'set_state' && STATES[state]) {
                applyState(state);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
