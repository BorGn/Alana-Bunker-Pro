<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Jost:wght@100;200&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Jost', sans-serif;
    padding: 16px 8px;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* ── Moldura ── */
  .avatar-frame {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: float 7s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
  }

  /* Anéis */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(100,180,255,0.15);
    animation: ring-spin 28s linear infinite;
  }
  .ring-1 { width: 150px; height: 150px; }
  .ring-1::before {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #64b4ff;
    top: -2.5px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 10px rgba(100,180,255,1), 0 0 20px rgba(100,180,255,0.5);
  }
  .ring-2 {
    width: 166px; height: 166px;
    border-color: rgba(100,180,255,0.06);
    animation-duration: 50s;
    animation-direction: reverse;
  }
  .ring-3 {
    width: 138px; height: 138px;
    border-color: rgba(200,100,100,0.1);
    animation-duration: 18s;
  }
  .ring-3::before {
    content: '';
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #e06060;
    bottom: -1.5px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px rgba(220,80,80,0.9);
  }

  @keyframes ring-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Pulsos */
  .pulse {
    position: absolute;
    width: 128px; height: 128px;
    border-radius: 50%;
    border: 1px solid rgba(100,180,255,0.2);
    opacity: 0;
    animation: pulse-out 5s ease-out infinite;
  }
  .pulse:nth-child(2) { animation-delay: 2.5s; }

  @keyframes pulse-out {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.55); opacity: 0; }
  }

  /* Círculo da imagem */
  .face-circle {
    width: 128px;
    height: 128px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1.5px rgba(100,180,255,0.2),
      0 0 30px rgba(100,180,255,0.1),
      0 10px 40px rgba(0,0,0,0.7);
    transition: box-shadow 0.8s ease;
  }

  .face-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    display: block;
    filter: brightness(0.92) contrast(1.05);
    transition: filter 0.8s ease;
  }

  /* Overlay sutil sobre a imagem */
  .face-circle::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 0%, rgba(100,180,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Scan line animada (detalhe cyberpunk) */
  .scanline {
    position: absolute;
    width: 128px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(100,180,255,0.3), transparent);
    border-radius: 50%;
    animation: scan 4s ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes scan {
    0%   { top: 20%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { top: 80%; opacity: 0; }
  }

  /* ── Estados ── */

  /* THINKING */
  body.thinking .ring-1 {
    border-color: rgba(100,180,255,0.3);
    animation-duration: 5s;
  }
  body.thinking .ring-1::before {
    box-shadow: 0 0 14px rgba(100,180,255,1), 0 0 28px rgba(100,180,255,0.6);
    width: 6px; height: 6px;
  }
  body.thinking .pulse {
    border-color: rgba(100,180,255,0.3);
    animation-duration: 1.8s;
  }
  body.thinking .face-circle {
    box-shadow:
      0 0 0 1.5px rgba(100,180,255,0.35),
      0 0 50px rgba(100,180,255,0.2),
      0 10px 40px rgba(0,0,0,0.7);
  }
  body.thinking .face-circle img { filter: brightness(0.85) contrast(1.1) hue-rotate(5deg); }
  body.thinking .scanline { animation-duration: 1.5s; opacity: 1; }

  /* SPEAKING */
  body.speaking .ring-1 {
    border-color: rgba(100,180,255,0.22);
    animation-duration: 3s;
  }
  body.speaking .ring-1::before {
    background: #80ccff;
    box-shadow: 0 0 16px rgba(100,200,255,1), 0 0 32px rgba(100,200,255,0.5);
  }
  body.speaking .face-circle {
    box-shadow:
      0 0 0 1.5px rgba(100,200,255,0.3),
      0 0 60px rgba(100,200,255,0.15),
      0 10px 40px rgba(0,0,0,0.7);
  }
  body.speaking .face-circle img { filter: brightness(1) contrast(1.05); }
  body.speaking .pulse { animation-duration: 1.4s; }

  /* ── Ondas de voz ── */
  .wave-bars {
    display: flex;
    gap: 3px;
    align-items: center;
    height: 16px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  body.speaking .wave-bars { opacity: 1; }

  .bar {
    width: 2px;
    background: #64b4ff;
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
    opacity: 0.8;
  }
  .bar:nth-child(1) { --h:5px;  animation-delay:0s; }
  .bar:nth-child(2) { --h:11px; animation-delay:0.1s; }
  .bar:nth-child(3) { --h:16px; animation-delay:0.2s; }
  .bar:nth-child(4) { --h:12px; animation-delay:0.15s; }
  .bar:nth-child(5) { --h:6px;  animation-delay:0.05s; }

  @keyframes wave {
    0%, 100% { height: 3px; }
    50%       { height: var(--h); }
  }

  /* ── Texto ── */
  .info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.25rem;
    color: #d0dde8;
    letter-spacing: 0.16em;
  }
  .divider {
    width: 30px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100,180,255,0.35), transparent);
  }
  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 100;
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #4a5a6a;
    transition: color 0.4s;
  }
  body.thinking .status { color: #5a8aaa; }
  body.speaking  .status { color: #6aaccc; }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #64b4ff;
    animation: dot-pulse 3s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 0.35; }
    50%       { opacity: 1; box-shadow: 0 0 6px #64b4ff; }
  }
</style>
</head>

  const labels = { idle: 'disponível', thinking: 'pensando', speaking: 'respondendo' };

  function setState(state) {
    document.body.className = state;
    document.getElementById('status-text').textContent = labels[state] || labels.idle;

  window.addEventListener('message', (e) => {

  });

  window.setAvatarState = setState;
